services:
  postgres:
    image: postgres:15-alpine
    container_name: media-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_pipeline
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: media-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: media-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/media_pipeline
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - UPLOAD_DIR=uploads/
      - DB_POOL_MAX=10
    volumes:
      - ./uploads:/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "start"]

  worker:
    build: .
    container_name: media-worker
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/media_pipeline
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - UPLOAD_DIR=uploads/
      - DB_POOL_MAX=20
      - DHASH_THRESHOLD=10
      - OCR_PROVIDER=tesseract
    volumes:
      - ./uploads:/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "start:worker"]

volumes:
  pgdata:
  redisdata:

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pipeline_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: media_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint

    - name: Build project
      run: npm run build

    - name: Initialize database schema
      run: npm run db:init
      env:
        DATABASE_URL: postgres://pipeline_user:password123@localhost:5432/media_pipeline

    - name: Run tests
      run: npm test
      env:
        CI: 'true'
        DATABASE_URL: postgres://pipeline_user:password123@localhost:5432/media_pipeline
        REDIS_URL: redis://localhost:6379
        REDIS_HOST: localhost
        REDIS_PORT: '6379'
        NODE_ENV: test
